<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-canvas); color: var(--text-1); font-family: var(--font-ui); }
  .wrap { display: flex; flex-direction: column; gap: 14px; padding: 14px; }
  .toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface-panel); border: var(--hairline); }
  .toolbar .sym { margin-left: auto; font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  .panel { border: var(--hairline); background: var(--surface-panel); }
  .ph { padding: 8px 14px; border-bottom: var(--hairline); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .pb { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
  .menu { background: var(--surface-panel); border: var(--hairline); border-radius: var(--radius-sm); box-shadow: var(--shadow-menu); padding: 6px 14px; width: 210px; display: flex; flex-direction: column; }
  .menuwrap { padding: 14px; display: flex; gap: 14px; align-items: flex-start; }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); line-height: 1.7; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Select, SegmentedControl, Checkbox, Button } = window.TorchDesignSystem_f84e77;
function Demo() {
  const [sym, setSym] = React.useState('BTC/USDT');
  const [tf, setTf] = React.useState('1H');
  const [type, setType] = React.useState('Candles');
  const [inds, setInds] = React.useState({ sma: true, ema: false, bb: true, vwap: false });
  return (
    <div className="wrap">
      <div className="toolbar">
        <Select label="Symbol" value={sym} onChange={setSym} options={['BTC/USDT', 'ETH/USDT', 'SOL/USDT']} />
        <Select label="TF" value={tf} onChange={setTf} options={['1m', '15m', '1H', '4H', '1D']} />
        <Select label="Data" value="Raw" options={['Raw', 'Heikin Ashi', 'Renko']} />
        <Button>Indicators ▾</Button>
        <span className="sym">{sym} · {tf}</span>
      </div>
      <div className="cols">
        <div className="panel">
          <div className="ph">segmentedcontrol</div>
          <div className="pb">
            <SegmentedControl options={['Candles', 'Line', 'Area', 'OHLC']} value={type} onChange={setType} />
            <SegmentedControl size="sm" options={['1m', '15m', '1H', '4H', '1D']} value={tf} onChange={setTf} />
            <span className="note">exclusive choice · active = accent fill<br />sm 26px · md 32px</span>
          </div>
        </div>
        <div className="panel">
          <div className="ph">indicator menu — floating layer</div>
          <div className="menuwrap">
            <div className="menu">
              <Checkbox label="SMA(20)" checked={inds.sma} onChange={(v) => setInds({ ...inds, sma: v })} />
              <Checkbox label="EMA(50)" checked={inds.ema} onChange={(v) => setInds({ ...inds, ema: v })} />
              <Checkbox label="Bollinger Bands" checked={inds.bb} onChange={(v) => setInds({ ...inds, bb: v })} />
              <Checkbox label="VWAP (session)" checked={inds.vwap} onChange={(v) => setInds({ ...inds, vwap: v })} />
            </div>
            <span className="note">the only surface that<br />carries a shadow:<br />--shadow-menu</span>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
