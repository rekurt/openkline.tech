<!-- @dsCard group="Type" viewport="700x230" name="Display — Space Grotesk" subtitle="Marketing headlines only · 500–700 · substitution, no display face in repo" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-ui); color: var(--text-1); }
  .panel { margin: 14px; border: var(--hairline); background: var(--surface-panel); display: grid; grid-template-columns: 170px 1fr; }
  .ph { grid-column: 1 / 3; padding: 8px 14px; border-bottom: var(--hairline); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); display: flex; justify-content: space-between; }
  .glyph { border-right: var(--hairline); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 14px; }
  .glyph .ag { font-family: var(--font-display); font-size: 88px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; }
  .glyph .ag em { font-style: normal; color: var(--ember); }
  .glyph .cap { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
  .specimens { display: flex; flex-direction: column; justify-content: center; padding: 10px 18px; gap: 9px; }
  .sp { display: flex; align-items: baseline; gap: 14px; }
  .sp .w { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); width: 64px; flex: none; text-align: right; }
  .sp .t { font-family: var(--font-display); letter-spacing: -0.02em; line-height: 1.15; white-space: nowrap; }
  .sp .t em { font-style: normal; color: var(--ember); }
</style>
</head>
<body>
  <div class="panel">
    <div class="ph"><span>--font-display · space grotesk</span><span>tracking −2% · headings only</span></div>
    <div class="glyph">
      <span class="ag">A<em>g</em></span>
      <span class="cap">500 · 600 · 700</span>
    </div>
    <div class="specimens">
      <div class="sp"><span class="w">700 · 30px</span><span class="t" style="font-size:30px; font-weight:700;">Not <em>your</em> engine, not <em>your</em> charts.</span></div>
      <div class="sp"><span class="w">700 · 24px</span><span class="t" style="font-size:24px; font-weight:700;">Batteries included</span></div>
      <div class="sp"><span class="w">600 · 18px</span><span class="t" style="font-size:18px; font-weight:600;">One core, any framework</span></div>
      <div class="sp"><span class="w">500 · 15px</span><span class="t" style="font-size:15px; font-weight:500;">Five lines to first candle — body stays on the system stack</span></div>
    </div>
  </div>
</body>
</html>
