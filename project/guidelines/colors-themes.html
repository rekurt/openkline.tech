<!-- @dsCard group="Colors" viewport="700x190" name="Dark / light themes" subtitle="DARK_THEME and LIGHT_THEME from the engine — dark is default" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-ui); color: var(--text-1); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px; }
  .theme { border: var(--hairline); border-radius: var(--radius-md); overflow: hidden; }
  .bar { display: flex; }
  .bar div { flex: 1; height: 30px; }
  .meta { padding: 8px 12px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); display: flex; justify-content: space-between; }
  .head { padding: 8px 12px 0; font-size: 12px; font-weight: 600; }
  .light { background: #ffffff; color: #131722; }
  .light .meta { color: #9598a1; }
</style>
</head>
<body>
  <div class="row">
    <div class="theme" style="background: #131722;">
      <div class="head">dark (default)</div>
      <div class="meta"><span>bg 131722</span><span>grid 1e222d</span><span>axis 363a45</span><span>text d1d4dc</span></div>
      <div class="bar"><div style="background:#131722"></div><div style="background:#1e222d"></div><div style="background:#363a45"></div><div style="background:#758696"></div><div style="background:#d1d4dc"></div><div style="background:#26a69a"></div><div style="background:#ef5350"></div></div>
    </div>
    <div class="theme light">
      <div class="head">light — [data-theme='light']</div>
      <div class="meta"><span>bg ffffff</span><span>grid f0f3fa</span><span>axis c8ccd8</span><span>text 131722</span></div>
      <div class="bar"><div style="background:#ffffff"></div><div style="background:#f0f3fa"></div><div style="background:#c8ccd8"></div><div style="background:#9598a1"></div><div style="background:#131722"></div><div style="background:#26a69a"></div><div style="background:#ef5350"></div></div>
    </div>
  </div>
</body>
</html>
