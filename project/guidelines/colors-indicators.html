<!-- @dsCard group="Colors" viewport="700x190" name="Indicator palette" subtitle="Overlay line colors in cycling order — shown as they render on canvas" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-ui); color: var(--text-1); }
  .chart {
    margin: 14px 14px 0;
    border: var(--hairline);
    background-color: var(--bg-canvas);
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 56px 28px;
  }
  .chart svg { display: block; width: 100%; height: 104px; }
  .chart path { fill: none; stroke-width: 1.75; stroke-linecap: round; }
  .legend { display: flex; gap: 0; margin: 0 14px; border: var(--hairline); border-top: 0; background: var(--surface-panel); }
  .ind { flex: 1; display: flex; flex-direction: column; gap: 3px; padding: 9px 12px; border-right: var(--hairline); }
  .ind:last-child { border-right: 0; }
  .name { display: flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 2px; flex: none; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="chart">
    <svg viewBox="0 0 672 104" preserveAspectRatio="none" aria-hidden="true">
      <path stroke="var(--ind-1)" d="M0,62 C50,56 80,34 130,38 C180,42 210,64 260,58 C310,52 340,26 390,30 C440,34 470,58 520,52 C570,46 610,28 672,24"></path>
      <path stroke="var(--ind-2)" d="M0,78 C55,74 95,58 145,60 C195,62 230,80 285,74 C340,68 370,48 420,50 C470,52 505,70 555,64 C605,58 640,44 672,40"></path>
      <path stroke="var(--ind-3)" d="M0,40 C50,46 90,20 140,24 C190,28 225,50 275,44 C325,38 360,14 410,18 C460,22 495,46 545,40 C595,34 635,16 672,12"></path>
      <path stroke="var(--ind-4)" d="M0,90 C60,88 100,76 150,78 C200,80 240,92 295,86 C350,80 385,66 435,68 C485,70 520,84 570,78 C620,72 650,62 672,58"></path>
      <path stroke="var(--ind-5)" d="M0,24 C55,30 90,12 140,16 C190,20 230,38 280,32 C330,26 365,8 415,12 C465,16 500,36 550,30 C600,24 640,10 672,8"></path>
    </svg>
  </div>
  <div class="legend">
    <div class="ind"><span class="name"><span class="dot" style="background: var(--ind-1);"></span>SMA</span><span class="tok">--ind-1 · #f5c344</span></div>
    <div class="ind"><span class="name"><span class="dot" style="background: var(--ind-2);"></span>EMA</span><span class="tok">--ind-2 · #58a6ff</span></div>
    <div class="ind"><span class="name"><span class="dot" style="background: var(--ind-3);"></span>Bollinger</span><span class="tok">--ind-3 · #c084fc</span></div>
    <div class="ind"><span class="name"><span class="dot" style="background: var(--ind-4);"></span>VWAP</span><span class="tok">--ind-4 · #f97583</span></div>
    <div class="ind"><span class="name"><span class="dot" style="background: var(--ind-5);"></span>5th line</span><span class="tok">--ind-5 · #56d364</span></div>
  </div>
</body>
</html>
