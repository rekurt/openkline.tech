<!-- @dsCard group="Spacing" viewport="700x240" name="App-shell constants" subtitle="The terminal is a fixed grid — redline from the engine + demo shell" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-mono); color: var(--text-1); }
  .stage { margin: 14px; border: var(--hairline); background: var(--surface-panel); }
  .ph { padding: 8px 14px; border-bottom: var(--hairline); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); display: flex; justify-content: space-between; }
  .shell { margin: 14px; height: 158px; display: grid; grid-template-columns: 48px 1fr 76px; grid-template-rows: 34px 1fr 19px 17px; border: var(--hairline); }
  .cell { position: relative; overflow: hidden; }
  .toolbar { grid-column: 1 / 4; background: var(--surface-panel); border-bottom: var(--hairline); display: flex; align-items: center; gap: 6px; padding: 0 10px; }
  .ctl { height: 14px; border: var(--hairline); background: var(--bg-canvas); border-radius: 3px; }
  .rail { grid-row: 2 / 4; background: var(--surface-panel); border-right: var(--hairline); display: flex; flex-direction: column; align-items: center; gap: 5px; padding-top: 7px; }
  .tool { width: 16px; height: 16px; border: var(--hairline); border-radius: 3px; }
  .tool.on { background: var(--accent); border-color: var(--accent); }
  .chart { background: var(--bg-canvas);
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 42px 26px; }
  .chart .price { position: absolute; left: 0; right: 0; top: 46%; border-top: 1px dashed var(--price-line); }
  .axis { background: var(--bg-canvas); border-left: var(--hairline); grid-row: 2 / 3; }
  .time { grid-column: 2 / 4; background: var(--bg-canvas); border-top: var(--hairline); }
  .status { grid-column: 1 / 4; background: var(--surface-panel); border-top: var(--hairline); }
  .dim { position: absolute; display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--ember); white-space: nowrap; }
  .dim .ln { background: var(--ember); }
  .dim .v { display: flex; flex-direction: column; gap: 1px; }
  .dim .tok { color: var(--text-muted); }
  .vline { width: 1px; } .hline { height: 1px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="ph"><span>app shell — fixed chrome</span><span>tokens from constants.ts + demo grid</span></div>
    <div class="shell">
      <div class="cell toolbar">
        <span class="ctl" style="width:64px"></span><span class="ctl" style="width:40px"></span><span class="ctl" style="width:52px"></span><span class="ctl" style="width:70px"></span>
        <span class="dim" style="right:10px; top:6px; bottom:6px;"><span class="ln vline" style="height:100%"></span><span class="v"><span>56</span><span class="tok">--toolbar-h</span></span></span>
      </div>
      <div class="cell rail">
        <span class="tool on"></span><span class="tool"></span><span class="tool"></span>
        <span class="dim" style="left:6px; bottom:5px;"><span class="ln hline" style="width:14px"></span><span class="v"><span>48</span><span class="tok">rail</span></span></span>
      </div>
      <div class="cell chart">
        <span class="price"></span>
        <span class="dim" style="left:10px; top:8px;"><span class="v"><span style="color:var(--text-muted)">chart canvas · 3 layers</span></span></span>
      </div>
      <div class="cell axis">
        <span class="dim" style="left:8px; top:8px;"><span class="ln hline" style="width:12px"></span><span class="v"><span>80</span><span class="tok">price axis</span></span></span>
      </div>
      <div class="cell time">
        <span class="dim" style="left:10px; top:4px;"><span class="v"><span>30 <span class="tok">--time-axis-h</span></span></span></span>
      </div>
      <div class="cell status">
        <span class="dim" style="left:10px; top:3px;"><span class="v"><span>28 <span class="tok">--statusbar-h · mono 11px hints</span></span></span></span>
      </div>
    </div>
  </div>
</body>
</html>
