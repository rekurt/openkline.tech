<!-- @dsCard group="Type" viewport="700x170" name="Mono — JetBrains Mono" subtitle="Every number on screen is mono + tabular-nums" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-mono); color: var(--text-1); }
  .wrap { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; font-variant-numeric: tabular-nums; }
  .big { font-size: var(--text-2xl); font-weight: 600; }
  .big .up { color: var(--bull); font-size: var(--text-md); font-weight: 400; }
  .row { font-size: var(--text-md); display: flex; gap: 24px; }
  .row span b { font-weight: 400; color: var(--text-muted); }
  .axis { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="big">67,412.50 <span class="up">▲ 2.31%</span></div>
    <div class="row"><span><b>O</b> 66,891.0</span><span><b>H</b> 67,580.2</span><span><b>L</b> 66,512.8</span><span><b>C</b> 67,412.5</span><span><b>V</b> 1.2K</span></div>
    <div class="axis">11px axis labels · 67,400 · 67,200 · 67,000 · 12 06:00 · 12 12:00 — substitute for ui-monospace / SF Mono / Menlo</div>
  </div>
</body>
</html>
