<!-- @dsCard group="Brand" viewport="700x250" name="Logo (draft)" subtitle="Bull candle with a burning wick — replace with real asset" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-ui); color: var(--text-1); }
  .panel { margin: 14px; border: var(--hairline); background: var(--surface-panel); }
  .ph { padding: 8px 14px; border-bottom: var(--hairline); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); display: flex; justify-content: space-between; }
  .grid { display: grid; grid-template-columns: 1.35fr 1fr 1fr; }
  .cell { border-right: var(--hairline); display: flex; flex-direction: column; }
  .cell:last-child { border-right: 0; }
  .cap { padding: 7px 12px; border-top: var(--hairline); font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); display: flex; justify-content: space-between; margin-top: auto; }
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; gap: 14px; padding: 22px 16px; min-height: 118px; }
  .stage.light { background: #ffffff; }
  .lockup { display: flex; align-items: center; gap: 13px; }
  .word { font-family: var(--font-display); font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .word small { display: block; font-family: var(--font-mono); font-size: 10px; font-weight: 400; color: var(--text-muted); letter-spacing: 0; margin-top: 5px; }
  .light .word { color: #131722; }
  .light .word small { color: #9598a1; }
  .sizes { display: flex; align-items: flex-end; gap: 18px; }
  .szi { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .szi i { font-style: normal; font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="panel">
    <div class="ph"><span>logo — draft mark</span><span>bull candle, burning wick · awaiting real asset</span></div>
    <div class="grid">
      <div class="cell">
        <div class="stage">
          <div class="lockup">
            <img src="../assets/logo-mark.svg" width="56" height="56" alt="openkline mark">
            <span class="word">openkline<small>@rekurt/openkline</small></span>
          </div>
        </div>
        <div class="cap"><span>primary lockup</span><span>gap = ¼ mark</span></div>
      </div>
      <div class="cell">
        <div class="stage light">
          <div class="lockup">
            <img src="../assets/logo-mark-light-bg.svg" width="56" height="56" alt="openkline mark on light">
          </div>
        </div>
        <div class="cap"><span>on light</span><span>deepened fills</span></div>
      </div>
      <div class="cell">
        <div class="stage">
          <div class="sizes">
            <span class="szi"><img src="../assets/logo-mark.svg" width="48" height="48" alt=""><i>48</i></span>
            <span class="szi"><img src="../assets/logo-mark.svg" width="32" height="32" alt=""><i>32</i></span>
            <span class="szi"><img src="../assets/logo-mark.svg" width="20" height="20" alt=""><i>20</i></span>
          </div>
        </div>
        <div class="cap"><span>scale</span><span>min 16px</span></div>
      </div>
    </div>
  </div>
</body>
</html>
