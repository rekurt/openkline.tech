<!-- @dsCard group="Brand" viewport="700x220" name="Iconography" subtitle="openkline stroke set — 24px grid, 1.75px stroke, currentColor · no emoji, ever" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-ui); color: var(--text-1); }
  .panel { margin: 14px; border: var(--hairline); background: var(--surface-panel); }
  .ph { padding: 8px 14px; border-bottom: var(--hairline); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); display: flex; justify-content: space-between; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 13px 4px 10px; border-right: var(--hairline); border-bottom: var(--hairline); }
  .tile:nth-child(8n) { border-right: 0; }
  .tile:nth-child(n+9) { border-bottom: 0; }
  .tile svg { width: 20px; height: 20px; fill: none; stroke: var(--text-1); stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .tile i { font-style: normal; font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
  .foot { padding: 8px 14px; border-top: var(--hairline); font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); display: flex; gap: 18px; }
  .foot .em { color: var(--ember); }
  .foot .uni { color: var(--text-1); }
</style>
</head>
<body>
  <div class="panel">
    <div class="ph"><span>icon component — 18 glyphs</span><span>lucide-style substitution · repo ships none</span></div>
    <div class="grid">
      <span class="tile"><svg viewBox="0 0 24 24"><path d="m4.5 4.5 6.5 15 2.2-6.3 6.3-2.2-15-6.5Z"/></svg><i>pointer</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg><i>crosshair</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="m6.8 17.2 10.4-10.4"/><rect x="3" y="17" width="4" height="4"/><rect x="17" y="3" width="4" height="4"/></svg><i>trendline</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="M7 12h10"/><rect x="2" y="10" width="4" height="4"/><rect x="18" y="10" width="4" height="4"/></svg><i>hline</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12"/></svg><i>rect</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="M4 4.5h16M4 10h16M4 14h16M4 19.5h16"/></svg><i>fib</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="m4 16.5 13-9M7 20.5l13-9"/></svg><i>channel</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="M3.5 6.5h17"/><path d="M18.5 6.5V19a2 2 0 0 1-2 2h-9a2 2 0 0 1-2-2V6.5"/><path d="M8.5 6.5v-2a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v2"/><path d="M10 11v6M14 11v6"/></svg><i>trash</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="M3.5 8.2a1.2 1.2 0 0 1 1.2-1.2h2.8l2-2.8h5l2 2.8h2.8a1.2 1.2 0 0 1 1.2 1.2v10.1a1.2 1.2 0 0 1-1.2 1.2H4.7a1.2 1.2 0 0 1-1.2-1.2V8.2Z"/><circle cx="12" cy="13" r="3.4"/></svg><i>camera</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="M12 3.2a6.8 6.8 0 0 0 8.8 8.8A8.8 8.8 0 1 1 12 3.2Z"/></svg><i>moon</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v2M12 19.5v2M5.3 5.3l1.4 1.4M17.3 17.3l1.4 1.4M2.5 12h2M19.5 12h2M5.3 18.7l1.4-1.4M17.3 6.7l1.4-1.4"/></svg><i>sun</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="M7.5 4.5 19 12 7.5 19.5v-15Z"/></svg><i>play</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="m4.5 12.5 4.8 4.8L19.5 6.5"/></svg><i>check</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg><i>x</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><path d="M4.5 12h15"/><path d="m13.5 6 6 6-6 6"/></svg><i>arrowRight</i></span>
      <span class="tile"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="m20.5 20.5-4.8-4.8M8.2 11h5.6M11 8.2v5.6"/></svg><i>zoomIn</i></span>
    </div>
    <div class="foot">
      <span><span class="em">never</span> emoji — anywhere</span>
      <span>copy affordances stay unicode: <span class="uni">→ ← ▾ · ▲ ▼ ✕ ✓</span></span>
      <span>usage: <span class="uni">&lt;Icon name="trendline" /&gt;</span></span>
    </div>
  </div>
</body>
</html>
