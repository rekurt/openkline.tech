<!-- @dsCard group="Colors" viewport="700x150" name="Text" subtitle="Two grays do all the work" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-ui); color: var(--text-1); }
  .wrap { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 120px; flex: none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tok">--text-1</span><span style="font-size: 14px; color: var(--text-1);">Primary text — UI labels, values, body. #d1d4dc</span></div>
    <div class="line"><span class="tok">--text-muted</span><span style="font-size: 14px; color: var(--text-muted);">Muted — hints, axis labels, inline form labels. #758696</span></div>
    <div class="line"><span class="tok">--text-on-accent</span><span style="font-size: 13px; background: var(--accent); color: var(--text-on-accent); padding: 3px 10px; border-radius: var(--radius-sm);">On accent — white</span></div>
    <div class="line"><span class="tok">hint string</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);">Drag pan · Wheel zoom · ←→ keys · T trend · Esc cancel · Dbl-click fit</span></div>
  </div>
</body>
</html>
