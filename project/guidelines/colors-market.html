<!-- @dsCard group="Colors" viewport="700x150" name="Market pair" subtitle="Bull/bear mean direction and nothing else" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-ui); color: var(--text-1); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
  .half { border: var(--hairline); border-radius: var(--radius-md); padding: 12px; display: flex; align-items: center; gap: 12px; }
  .chip { width: 56px; height: 56px; border-radius: var(--radius-sm); flex: none; position: relative; }
  .vol { position: absolute; inset: auto 0 0 0; height: 22px; border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
  .name { font-size: 13px; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
  .delta { font-family: var(--font-mono); font-size: 13px; margin-left: auto; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="half">
      <div class="chip" style="background: var(--bull);"><div class="vol" style="background: var(--bull-volume);"></div></div>
      <div><span class="name">bull</span><span class="hex">--bull #26a69a · volume @ 30%</span></div>
      <span class="delta" style="color: var(--bull);">▲ 2.31%</span>
    </div>
    <div class="half">
      <div class="chip" style="background: var(--bear);"><div class="vol" style="background: var(--bear-volume);"></div></div>
      <div><span class="name">bear</span><span class="hex">--bear #ef5350 · volume @ 30%</span></div>
      <span class="delta" style="color: var(--bear);">▼ 0.84%</span>
    </div>
  </div>
</body>
</html>
