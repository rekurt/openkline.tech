<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Depth = lighter surface, never shadow" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); font-family: var(--font-ui); color: var(--text-1); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
  .sw { border: var(--hairline); border-radius: var(--radius-md); height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .name { font-size: 12px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--bg-canvas);"><span class="name">canvas</span><span class="hex">--bg-canvas · #131722</span></div>
    <div class="sw" style="background: var(--surface-panel);"><span class="name">panel</span><span class="hex">--surface-panel · #1e222d</span></div>
    <div class="sw" style="background: var(--surface-raised);"><span class="name">raised</span><span class="hex">--surface-raised · #262b38</span></div>
    <div class="sw" style="background: var(--border);"><span class="name">hairline</span><span class="hex">--border · #363a45</span></div>
  </div>
</body>
</html>
